<div class="board-container">
  <div
    class="board"
    [style.gridTemplateColumns]="'repeat(' + game.state().cols + ', var(--cell-size))'"
  >
    @for (row of game.state().board; track $index) {
      @for (cell of row; track cell.row + '-' + cell.col) {
        <app-game-cell
          [cell]="cell"
          (open)="onOpen(cell.row, cell.col)"
          (flag)="onFlag(cell.row, cell.col)"
          (autoFlag)="onAutoFlag(cell.row, cell.col)"
        />
      }
    }
  </div>
</div>
